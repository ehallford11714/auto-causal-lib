[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autocausal"
version = "0.2.0"
description = "Auto-impute, mine, discover, guide, and ground exploratory causal relationships from CSV and SQL databases."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AutoCausalLib" }]
keywords = ["causal", "imputation", "discovery", "sqlalchemy", "tabular", "mining"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
  "numpy>=1.24",
  "pandas>=2.0",
  "sqlalchemy>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pyarrow>=14.0"]
datamine = []  # pip install -e ../DataMineLib — see autocausal.datamine_adapter
parquet = ["pyarrow>=14.0"]
postgres = ["psycopg2-binary>=2.9"]
vertica = ["vertica-python>=1.3"]
mysql = ["pymysql>=1.1"]
mariadb = ["pymysql>=1.1"]
mssql = ["pyodbc>=5.0"]
oracle = ["oracledb>=2.0"]
duckdb = ["duckdb>=0.10", "duckdb-engine>=0.13"]
snowflake = ["snowflake-sqlalchemy>=1.5"]
bigquery = ["sqlalchemy-bigquery>=1.11"]
redshift = ["sqlalchemy-redshift>=0.8", "psycopg2-binary>=2.9"]
cockroachdb = ["psycopg2-binary>=2.9"]
trino = ["trino>=0.328"]
presto = ["pyhive[presto]>=0.7"]
clickhouse = ["clickhouse-sqlalchemy>=0.3"]
databricks = ["databricks-sqlalchemy>=1.0"]
synapse = ["pyodbc>=5.0"]
firebird = ["sqlalchemy-firebird>=0.8"]
hana = ["sqlalchemy-hana>=0.5"]
sqlite = []
slm = ["torch>=2.0", "transformers>=4.36"]
nlp = ["nltk>=3.8", "gensim>=4.3"]
nlp-full = ["autocausal[nlp]", "spacy>=3.7"]
causal-extra = ["dowhy>=0.11", "econml>=0.15"]
web = ["httpx>=0.27"]
suite = ["autocausal[nlp,slm,web]"]
all-drivers = [
  "autocausal[postgres,vertica,mysql,mariadb,mssql,oracle,duckdb,snowflake,bigquery,redshift,cockroachdb,trino,presto,clickhouse,databricks,synapse,parquet]",
]

[project.scripts]
autocausal = "autocausal.cli:main"

[project.urls]
Homepage = "https://github.com/ehallford11714/auto-causal-lib"
Documentation = "docs/CONNECTIONS.md"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
autocausal = ["data/**/*", "data/public/**/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
